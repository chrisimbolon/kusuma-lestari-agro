name: Deploy KLA to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build React frontend ──────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          VITE_API_URL=https://kusumaorganik.com npm run build

      # ── 3. Write .env on runner from GitHub Secrets ──────────
      - name: Write .env file
        env:
          SECRET_KEY:           ${{ secrets.SECRET_KEY }}
          DB_NAME:              ${{ secrets.DB_NAME }}
          DB_USER:              ${{ secrets.DB_USER }}
          DB_PASSWORD:          ${{ secrets.DB_PASSWORD }}
          ALLOWED_HOSTS:        ${{ secrets.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          printf '%s\n' \
            "SECRET_KEY=${SECRET_KEY}" \
            "DEBUG=False" \
            "ALLOWED_HOSTS=${ALLOWED_HOSTS}" \
            "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}" \
            "DB_NAME=${DB_NAME}" \
            "DB_USER=${DB_USER}" \
            "DB_PASSWORD=${DB_PASSWORD}" \
            "DB_HOST=kla_db" \
            "DB_PORT=5432" \
            "DJANGO_SETTINGS_MODULE=kla_project.settings" \
            > .env

      # ── 4. Set up SSH ────────────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 5. Upload frontend dist via rsync ────────────────────
      - name: Upload frontend dist
        run: |
          rsync -avz --delete frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/kla/

      # ── 6. Upload .env to server ─────────────────────────────
      - name: Upload .env file
        run: |
          rsync -avz .env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/apps/kla/.env

      # ── 7. Deploy on server via SSH ──────────────────────────
      - name: Deploy to Droplet
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /home/apps/kla

            echo "Pulling latest code..."
            git pull origin main

            echo "Rebuilding backend + db containers..."
            docker compose -f docker-compose.prod.yml up -d --build kla_backend kla_db

            echo "Waiting for kla_db to be healthy..."
            until docker inspect kla_db \
              --format='{{.State.Health.Status}}' | grep -q "healthy"; do
              sleep 3
            done
            echo "kla_db is healthy"

            echo "Running migrations..."
            docker exec kla_backend \
              python manage.py migrate --noinput

            echo "Collecting static files..."
            docker exec kla_backend \
              python manage.py collectstatic --noinput

            echo "Reloading Caddy..."
            docker exec caddy-container \
              caddy reload --config /etc/caddy/Caddyfile

            echo "KLA deployment completed successfully!"
            docker ps | grep kla
          EOF