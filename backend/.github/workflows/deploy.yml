name: Deploy KLA to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kla-backend

jobs:

  # ── JOB 1: Build + push backend image ────────────────────────
  build-backend:
    name: 🐳 Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── JOB 2: Build React + deploy to server ────────────────────
  build-frontend:
    name: ⚛️ Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://kusumaorganik.com
        run: npm run build

      - name: SCP dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:             ${{ secrets.DO_HOST }}
          username:         root
          key:              ${{ secrets.DO_SSH_KEY }}
          source:           "frontend/dist/*"
          target:           "/var/www/kla"
          strip_components: 2

  # ── JOB 3: Deploy on server ───────────────────────────────────
  deploy:
    name: 🚀 Deploy + Reload Caddy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DO_HOST }}
          username: root
          key:      ${{ secrets.DO_SSH_KEY }}
          source:   "docker-compose.prod.yml"
          target:   "/home/apps/kla"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DO_HOST }}
          username: root
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest backend image
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Start/update all KLA services (kla_db + kla_backend)
            cd /home/apps/kla
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
              docker compose -f docker-compose.prod.yml up -d

            # Wait for DB healthcheck to pass
            echo "Waiting for kla_db to be healthy..."
            until docker inspect kla_db \
              --format='{{.State.Health.Status}}' | grep -q "healthy"; do
              sleep 3
            done
            echo "kla_db is healthy ✅"

            # Run migrations
            docker exec kla_backend \
              python manage.py migrate --noinput

            # Collect static files
            docker exec kla_backend \
              python manage.py collectstatic --noinput

            # Reload Caddy
            docker exec caddy-container \
              caddy reload --config /etc/caddy/Caddyfile

            # Verify
            echo "── Running containers ──"
            docker ps | grep kla

            echo "── Deploy complete ✅ ──"
